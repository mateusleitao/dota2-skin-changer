syntax = "proto2";

option optimize_for = SPEED;

message CMsgProtoBufHeader {
    optional fixed64 client_steam_id = 1;
    optional int32 client_session_id = 2;
    optional uint32 source_app_id = 3;
    optional fixed64 job_id_source = 10 [default = 0xFFFFFFFFFFFFFFFF];
    optional fixed64 job_id_target = 11 [default = 0xFFFFFFFFFFFFFFFF];
    optional string target_job_name = 12;
    optional int32 eresult = 13 [default = 2];
    optional string error_message = 14;
    optional uint32 ip = 15;
    optional uint32 auth_account_flags = 16;
    optional int32 token_source = 22;
    optional bool admin_spoofing_user = 23;
    optional int32 transport_error = 17 [default = 1];
    optional uint64 messageid = 18 [default = 0xFFFFFFFFFFFFFFFF];
    optional uint32 publisher_group_id = 19;
    optional uint32 sysid = 20;
    optional uint64 trace_tag = 21;
    optional uint32 webapi_key_id = 25;
    optional bool is_from_external_source = 26;
    repeated uint32 forward_to_sysid = 27;
    optional uint32 cm_sysid = 28;
    optional uint32 wg_token = 30;
    optional uint32 launcher_type = 31 [default = 0];
    optional uint32 realm = 32 [default = 0];
}
